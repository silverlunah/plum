# Runner node — backend + postgres only, no frontend UI.
# Start with: plum node start --token <secret> --primary http://primary:3001

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plum
      POSTGRES_USER: plum
      POSTGRES_PASSWORD: plum
    volumes:
      - node_postgres_data:/var/lib/postgresql/data
    networks:
      - node-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plum']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: 'postgresql://plum:plum@postgres:5432/plum'
      PLUM_MODE: 'node'
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/tests:/app/tests:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - node-network

networks:
  node-network:
    driver: bridge

volumes:
  node_postgres_data:
