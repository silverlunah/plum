services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plum
      POSTGRES_USER: plum
      POSTGRES_PASSWORD: plum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plum']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: 'postgresql://plum:plum@postgres:5432/plum'
    volumes:
      - ./backend/reports:/app/reports
      - ./backend/config:/app/config
      - ./backend/tests:/app/tests:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
